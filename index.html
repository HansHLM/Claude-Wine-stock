<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wine Cellar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🍷 Wine Cellar</h1>
    <div class="stats" id="stats"></div>
  </header>

  <main>
    <section class="controls">
      <button class="btn btn-primary" id="btnAdd">+ Add Wine</button>
      <div class="search-filter">
        <input type="text" id="search" placeholder="Search wines…" />
        <select id="filterType">
          <option value="">All types</option>
          <option value="Red">Red</option>
          <option value="White">White</option>
          <option value="Rosé">Rosé</option>
          <option value="Sparkling">Sparkling</option>
          <option value="Dessert">Dessert</option>
          <option value="Fortified">Fortified</option>
        </select>
        <select id="sortBy">
          <option value="name">Sort: Name</option>
          <option value="vintage">Sort: Vintage</option>
          <option value="type">Sort: Type</option>
          <option value="quantity">Sort: Quantity</option>
        </select>
      </div>
    </section>

    <section id="wineList" class="wine-list"></section>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalTitle">Add Wine</h2>
      <form id="wineForm" novalidate>
        <input type="hidden" id="wineId" />

        <div class="form-row">
          <label>Name *
            <input type="text" id="wineName" required placeholder="Château Margaux" />
          </label>
          <label>Type *
            <select id="wineType" required>
              <option value="">Select…</option>
              <option>Red</option>
              <option>White</option>
              <option>Rosé</option>
              <option>Sparkling</option>
              <option>Dessert</option>
              <option>Fortified</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>Vintage
            <input type="number" id="wineVintage" min="1800" max="2099" placeholder="2019" />
          </label>
          <label>Region / Producer
            <input type="text" id="wineRegion" placeholder="Bordeaux, France" />
          </label>
        </div>

        <div class="form-row">
          <label>Quantity *
            <input type="number" id="wineQuantity" min="1" required placeholder="6" />
          </label>
          <label>Price per bottle (€)
            <input type="number" id="winePrice" min="0" step="0.01" placeholder="25.00" />
          </label>
        </div>

        <label>Notes
          <textarea id="wineNotes" rows="3" placeholder="Tasting notes, food pairings…"></textarea>
        </label>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="btnCancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm delete -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-box small">
      <h2>Delete wine?</h2>
      <p id="confirmMsg"></p>
      <div class="form-actions">
        <button class="btn btn-ghost" id="confirmNo">Cancel</button>
        <button class="btn btn-danger" id="confirmYes">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
